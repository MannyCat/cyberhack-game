name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze_output.txt || true
          echo 'Analyzer step completed (non-fatal)'

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            analyze_output.txt
            build_output.txt

      - name: Build APK (release)
        run: |
          flutter build apk --release 2>&1 | tee build_output.txt || {
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
            cat build_output.txt >> $GITHUB_STEP_SUMMARY
            echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Rename APK
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk/ -name '*.apk' | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "build/app/outputs/flutter-apk/CyberHack-v${{ github.run_number }}.apk"
          else
            echo "Warning: APK not found in expected location"
            ls -laR build/app/outputs/ || true
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberHack-APK
          path: build/app/outputs/flutter-apk/CyberHack-v*.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CyberHack v1.0.${{ github.run_number }}
          body: |
            ## CyberHack — Многопользовательская онлайн-стратегия о хакерстве

            Автоматическая сборка из коммита `${{ github.sha }}`
          files: build/app/outputs/flutter-apk/CyberHack-v*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
