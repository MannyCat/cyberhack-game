name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/CyberHack-v${{ github.run_number }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberHack-APK
          path: build/app/outputs/flutter-apk/CyberHack-v${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CyberHack v1.0.${{ github.run_number }}
          body: |
            ## CyberHack — Многопользовательская онлайн-стратегия о хакерстве

            Автоматическая сборка из коммита `${{ github.sha }}`
          files: build/app/outputs/flutter-apk/CyberHack-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
