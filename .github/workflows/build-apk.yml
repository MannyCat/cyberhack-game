name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build with debug info'
        required: false
        default: 'false'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.3'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze_output.txt || true
          echo 'Analyzer step completed (non-fatal)'

      - name: Build APK (release)
        id: build
        run: |
          flutter build apk --release 2>&1 | tee build_output.txt
          EXIT_CODE=$?
          echo "=== Build exit code: $EXIT_CODE ==="
          echo "=== Searching for APK ==="
          find . -name '*.apk' -type f 2>/dev/null
          echo "=== build/app/outputs tree ==="
          find build/app/outputs -type f 2>/dev/null || echo "(no outputs dir)"
          exit $EXIT_CODE

      - name: Upload all logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            analyze_output.txt
            build_output.txt

      - name: Find and prepare APK
        id: apk
        run: |
          echo "=== All files in build/app/outputs ==="
          find build/app/outputs -type f 2>/dev/null || echo "(empty)"
          APK_PATH=$(find build/app/outputs -name '*.apk' -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CyberHack-APK
          path: build/app/outputs/flutter-apk/
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: v2.5.${{ github.run_number }}
          name: CyberHack v2.5.${{ github.run_number }}
          body: |
            ## CyberHack — Многопользовательская онлайн-стратегия о хакерстве
            
            ### Что нового (v2.5.0):
            - Система недельных событий (Турнир хакеров, Чёрная пятница, Клановый рейд, Охота на баги)
            - Ежедневные награды со стриком 1-7 дней
            - 10 достижений для отслеживания прогресса
            - Анти-спам защита в глобальном чате
            - Управление узлами сети (scanner, terminal, database, proxy)
            - Улучшенная PvP-механика атак
            - Исправлено ~17 багов
            
            Автоматическая сборка из коммита ${{ github.sha }}
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
